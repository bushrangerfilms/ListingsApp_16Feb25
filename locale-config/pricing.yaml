# pricing.yaml — multi-currency Stripe pricing source of truth.
#
# Each plan has six currencies (EUR/GBP/USD/CAD/AUD/NZD). EUR is canonical
# (matches `plan_definitions.monthly_price_cents`); other currencies are
# rounded to nearest 5 in whole-currency units to give clean local pricing.
#
# Workflow:
#   1. Edit this file: set `price_cents` for any new currencies that need
#      activating, leave `stripe_id` as null.
#   2. Run `npx tsx scripts/seed-stripe-prices.ts` (Tier 3 task 11).  The
#      script reads any `price_cents` row whose `stripe_id` is null, creates
#      the corresponding Stripe Price object, and writes the resulting
#      `price_xxxxx` ID back into this file.
#   3. Commit the updated yaml.  A second script syncs `plan_definitions.
#      stripe_monthly_price_id_<currency>` and `price_cents_<currency>`
#      columns from this yaml.
#   4. `stripe-checkout` reads the per-currency column matching the org's
#      currency.
#
# Do NOT hand-edit `stripe_id` values once written — they're produced by
# the Stripe API and editing causes silent mismatches.  If you need to
# rotate a price, set `stripe_id: null` and re-run seed.
#
# All amounts are in the smallest currency unit (cents / pence / etc.).
# All `billing_interval: week` matches the existing weekly pricing model.

billing_interval: week

plans:
